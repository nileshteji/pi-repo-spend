<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">repo-spend current repo output screenshot</title>
  <desc id="desc">Example Pi markdown output for /repo-spend showing scope, totals, provider breakdown, and model breakdown.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .terminal { fill: #0b1220; stroke: #263244; stroke-width: 1; filter: url(#shadow); }
      .bar { fill: #111827; }
      .dot-red { fill: #ff5f57; }
      .dot-yellow { fill: #ffbd2e; }
      .dot-green { fill: #28c840; }
      .muted { fill: #94a3b8; font: 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .text { fill: #dbeafe; font: 19px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .heading { fill: #f8fafc; font: 700 30px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .subheading { fill: #e2e8f0; font: 700 23px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .accent { fill: #7dd3fc; font: 700 19px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .money { fill: #86efac; font: 700 19px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .rule { stroke: #334155; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1180" height="760" rx="28" fill="url(#bg)"/>
  <rect x="46" y="42" width="1088" height="676" rx="18" class="terminal"/>
  <rect x="46" y="42" width="1088" height="54" rx="18" class="bar"/>
  <circle cx="80" cy="70" r="9" class="dot-red"/>
  <circle cx="108" cy="70" r="9" class="dot-yellow"/>
  <circle cx="136" cy="70" r="9" class="dot-green"/>
  <text x="172" y="77" class="muted">Pi • /repo-spend</text>

  <text x="76" y="136" class="heading">Pi repo spend</text>
  <text x="76" y="174" class="text"><tspan class="accent">Scope:</tspan> Repo: /Users/nileshteji/aibot/pi-repo-spend</text>
  <text x="76" y="206" class="text"><tspan class="accent">Session root:</tspan> ~/.pi/agent/sessions</text>

  <text x="76" y="258" class="subheading">Summary</text>
  <line x1="76" y1="278" x2="1104" y2="278" class="rule"/>
  <text x="92" y="318" class="text">Session files scanned</text><text x="510" y="318" class="text">284</text>
  <text x="92" y="352" class="text">Session files included</text><text x="510" y="352" class="text">12</text>
  <text x="92" y="386" class="text">Assistant calls with usage</text><text x="510" y="386" class="text">145</text>
  <text x="92" y="420" class="text">Total tokens</text><text x="510" y="420" class="text">2,914,830</text>
  <text x="92" y="454" class="text">Recorded cost</text><text x="510" y="454" class="money">$8.52</text>
  <text x="92" y="488" class="text">Estimated Ollama Cloud cost</text><text x="510" y="488" class="money">$0.38</text>
  <text x="92" y="522" class="text">Total cost</text><text x="510" y="522" class="money">$8.90</text>

  <text x="76" y="584" class="subheading">By provider</text>
  <line x1="76" y1="604" x2="1104" y2="604" class="rule"/>
  <text x="92" y="642" class="muted">Provider</text><text x="260" y="642" class="muted">Calls</text><text x="390" y="642" class="muted">Tokens</text><text x="610" y="642" class="muted">Recorded</text><text x="785" y="642" class="muted">Estimate</text><text x="960" y="642" class="muted">Total</text>
  <text x="92" y="676" class="text">openai-codex</text><text x="260" y="676" class="text">121</text><text x="390" y="676" class="text">2,441,998</text><text x="610" y="676" class="money">$8.52</text><text x="785" y="676" class="money">$0.00</text><text x="960" y="676" class="money">$8.52</text>
