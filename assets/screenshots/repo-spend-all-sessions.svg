<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
  <title id="title">repo-spend all sessions output screenshot</title>
  <desc id="desc">Example Pi markdown output for /repo-spend all showing spend grouped by repository and current working directory.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#172554"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .terminal { fill: #08111f; stroke: #243449; stroke-width: 1; filter: url(#shadow); }
      .bar { fill: #101827; }
      .dot-red { fill: #ff5f57; }
      .dot-yellow { fill: #ffbd2e; }
      .dot-green { fill: #28c840; }
      .muted { fill: #9ca3af; font: 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .text { fill: #e0f2fe; font: 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .heading { fill: #f8fafc; font: 700 30px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .subheading { fill: #e2e8f0; font: 700 23px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .accent { fill: #93c5fd; font: 700 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .money { fill: #bbf7d0; font: 700 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .rule { stroke: #334155; stroke-width: 1; }
      .rowbg { fill: #0f1b2d; }
    </style>
  </defs>

  <rect width="1180" height="720" rx="28" fill="url(#bg)"/>
  <rect x="46" y="42" width="1088" height="636" rx="18" class="terminal"/>
  <rect x="46" y="42" width="1088" height="54" rx="18" class="bar"/>
  <circle cx="80" cy="70" r="9" class="dot-red"/>
  <circle cx="108" cy="70" r="9" class="dot-yellow"/>
  <circle cx="136" cy="70" r="9" class="dot-green"/>
  <text x="172" y="77" class="muted">Pi • /repo-spend all</text>

  <text x="76" y="136" class="heading">Pi repo spend</text>
  <text x="76" y="174" class="text"><tspan class="accent">Scope:</tspan> All Pi sessions</text>
  <text x="76" y="206" class="text"><tspan class="accent">Total cost:</tspan> <tspan class="money">$24.71</tspan> across 511 assistant calls</text>

  <text x="76" y="268" class="subheading">By repo / cwd</text>
  <line x1="76" y1="290" x2="1104" y2="290" class="rule"/>

  <text x="92" y="332" class="muted">Repo / cwd</text>
  <text x="482" y="332" class="muted">Sessions</text>
  <text x="606" y="332" class="muted">Calls</text>
