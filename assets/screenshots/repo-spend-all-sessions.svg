  <text x="852" y="385" class="money">$8.90</text>
  <text x="956" y="385" class="text">openai-codex/gpt-5.5</text>

  <text x="92" y="442" class="text">my-app</text>
  <text x="482" y="442" class="text">9</text>
  <text x="606" y="442" class="text">112</text>
  <text x="708" y="442" class="text">2,108,441</text>
  <text x="852" y="442" class="money">$6.47</text>
  <text x="956" y="442" class="text">openai-codex/gpt-5.5</text>

  <rect x="76" y="468" width="1028" height="48" rx="8" class="rowbg"/>
  <text x="92" y="499" class="text">knowledge-base</text>
  <text x="482" y="499" class="text">7</text>
  <text x="606" y="499" class="text">88</text>
