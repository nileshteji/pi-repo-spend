  <text x="852" y="332" class="muted">Total</text>
  <text x="956" y="332" class="muted">Top model</text>

  <rect x="76" y="354" width="1028" height="48" rx="8" class="rowbg"/>
  <text x="92" y="385" class="text">pi-repo-spend</text>
  <text x="482" y="385" class="text">12</text>
  <text x="606" y="385" class="text">145</text>
